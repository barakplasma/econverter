name: Apply repository quality fixes

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install quality tools and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'ruff==0.15.22' 'ty==0.0.60'
          python -m pip install -r tests/python/requirements.txt

      - name: Apply Ruff fixes and formatting
        run: |
          ruff check --fix --unsafe-fixes . || true
          ruff format .

      - name: Capture strict diagnostics
        run: |
          ruff check --output-format=concise . > docs/ruff-diagnostics.md 2>&1 || true
          ty check --output-format concise . > docs/ty-diagnostics.md 2>&1 || true
          python -m pytest tests/python > docs/pytest-diagnostics.md 2>&1 || true
          cat docs/ruff-diagnostics.md

      - name: Commit formatted tree and diagnostics
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -u
          git add -f docs/ruff-diagnostics.md docs/ty-diagnostics.md docs/pytest-diagnostics.md
          git commit -m 'Apply Ruff formatting and capture quality diagnostics'
          git push origin HEAD:${{ github.head_ref }}
