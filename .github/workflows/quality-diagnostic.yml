name: Apply repository quality fixes

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install quality tools and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'ruff==0.15.22' 'ty==0.0.60'
          python -m pip install -r tests/python/requirements.txt

      - name: Apply Ruff fixes and formatting
        run: |
          ruff check --fix --unsafe-fixes . || true
          ruff format .

      - name: Verify Ruff lint
        run: ruff check .

      - name: Verify Ruff formatting
        run: ruff format --check .

      - name: Verify types with ty
        run: ty check --output-format concise .

      - name: Run host conversion tests
        run: python -m pytest tests/python

      - name: Commit fixes
        run: |
          rm .github/workflows/quality-diagnostic.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -u
          git commit -m 'Format Python and add Ruff and ty checks'
          git push origin HEAD:${{ github.head_ref }}
