name: Quality diagnostic

on:
  push:
    branches:
      - claude/pr-review-lxml-fixes-dohoga
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-diagnostic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: claude/pr-review-lxml-fixes-dohoga

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install quality tools and project test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff ty
          python -m pip install -r tests/python/requirements.txt

      - name: Apply Ruff fixes and formatting across the repository
        run: |
          set +e
          ruff check --fix --unsafe-fixes . > ruff-fix.log 2>&1
          echo "ruff_fix_status=$?" >> "$GITHUB_ENV"
          ruff format . > ruff-format.log 2>&1
          echo "ruff_format_status=$?" >> "$GITHUB_ENV"
          set -e
          git diff --stat
          git diff > quality.patch

      - name: Check Ruff after autofix
        continue-on-error: true
        run: |
          ruff check --output-format=github . 2>&1 | tee ruff-check.log
          test "${PIPESTATUS[0]}" -eq 0

      - name: Check types with ty
        continue-on-error: true
        run: |
          ty check --output-format github . 2>&1 | tee ty-check.log
          test "${PIPESTATUS[0]}" -eq 0

      - name: Run host conversion suite on formatted tree
        continue-on-error: true
        run: python -m pytest tests/python 2>&1 | tee pytest.log

      - name: Summarize diagnostics
        if: always()
        run: |
          echo "Ruff autofix status: ${ruff_fix_status:-unknown}"
          echo "Ruff format status: ${ruff_format_status:-unknown}"
          echo '=== Remaining Ruff diagnostics ==='
          tail -n 200 ruff-check.log 2>/dev/null || true
          echo '=== ty diagnostics ==='
          tail -n 300 ty-check.log 2>/dev/null || true
          echo '=== Test summary ==='
          tail -n 100 pytest.log 2>/dev/null || true
          echo '=== Diff stat ==='
          git diff --stat || true

      - name: Upload quality diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-diagnostic
          path: |
            quality.patch
            ruff-fix.log
            ruff-format.log
            ruff-check.log
            ty-check.log
            pytest.log
          if-no-files-found: warn
