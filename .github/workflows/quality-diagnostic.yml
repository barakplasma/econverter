name: Quality diagnostic

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: quality-diagnostic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install quality tools and project test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff ty
          python -m pip install -r tests/python/requirements.txt

      - name: Apply Ruff fixes and formatting across the repository
        run: |
          set +e
          ruff check --fix --unsafe-fixes . > ruff-fix.log 2>&1
          echo "ruff_fix_status=$?" >> "$GITHUB_ENV"
          ruff format . > ruff-format.log 2>&1
          echo "ruff_format_status=$?" >> "$GITHUB_ENV"
          set -e
          git diff > quality.patch

      - name: Check Ruff after autofix
        continue-on-error: true
        run: |
          ruff check --output-format=concise . 2>&1 | tee ruff-check.log
          test "${PIPESTATUS[0]}" -eq 0

      - name: Check types with ty
        continue-on-error: true
        run: |
          ty check --output-format concise . 2>&1 | tee ty-check.log
          test "${PIPESTATUS[0]}" -eq 0

      - name: Run host conversion suite on formatted tree
        continue-on-error: true
        run: python -m pytest tests/python 2>&1 | tee pytest.log

      - name: Publish temporary diagnostics to the branch
        if: always()
        run: |
          mkdir -p .quality-diagnostic
          cp quality.patch ruff-fix.log ruff-format.log ruff-check.log ty-check.log pytest.log .quality-diagnostic/ 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .quality-diagnostic
          git commit -m 'Publish quality diagnostics [skip ci]'
          git push origin HEAD:${{ github.head_ref }}
