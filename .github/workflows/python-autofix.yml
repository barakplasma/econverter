name: Python autofix

on:
  push:
    branches-ignore:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: python-autofix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  autofix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: tests/python/requirements.txt

      - name: Set up uv for ty
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies and Ruff
        run: |
          python -m pip install -r tests/python/requirements.txt
          python -m pip install 'ruff==0.15.22'

      - name: Apply ty fixes
        run: |
          uvx --from ty==0.0.60 \
            --with-requirements tests/python/requirements.txt \
            ty check --fix . || true

      - name: Normalize Python with Ruff
        run: |
          ruff check --fix --unsafe-fixes . || true
          ruff format .

      - name: Validate autofixed tree
        run: |
          ruff check .
          ruff format --check .
          python -m pytest tests/python

      - name: Commit automatic fixes
        id: commit
        run: |
          if git diff --quiet; then
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -u
          git commit -m 'Apply automatic ty and Ruff fixes'
          git push origin HEAD:${{ github.ref_name }}
          echo 'changed=true' >> "$GITHUB_OUTPUT"

      - name: Verify remaining types
        run: >-
          uvx --from ty==0.0.60
          --with-requirements tests/python/requirements.txt
          ty check --output-format github .
