name: Markdown Android E2E release

on:
  push:
    branches:
      - 'master'
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: markdown-android-e2e-release
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mark build pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state=pending \
            -f context='Markdown Android E2E release' \
            -f description='Emulator conversion test and release build started' \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Smoke-test Markdown and Mermaid rendering
        id: smoke
        continue-on-error: true
        run: |
          set -o pipefail
          {
            python -m pip install 'markdown>=3.4,<4' 'merm==0.1.5'
            python - <<'PY'
          import importlib.util
          import shutil
          import tempfile
          from pathlib import Path

          from markdown import markdown

          module_path = Path('app/src/main/python/ebook_converter/ebooks/txt/mermaid.py')
          spec = importlib.util.spec_from_file_location('econverter_mermaid', module_path)
          mermaid = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mermaid)
          render_fenced_diagrams = mermaid.render_fenced_diagrams

          table = markdown('| A | B |\n|---|---|\n| 1 | 2 |', extensions=['tables'])
          assert '<table>' in table

          with tempfile.TemporaryDirectory() as base_dir:
              source = '# Diagram\n\n```mermaid\nflowchart LR\n    A --> B\n```\n'
              rendered, diagram_dir = render_fenced_diagrams(source, base_dir)
              assert diagram_dir is not None
              assert '![Mermaid diagram]' in rendered
              svg_files = list(Path(diagram_dir).glob('*.svg'))
              assert len(svg_files) == 1
              assert '<svg' in svg_files[0].read_text(encoding='utf-8')
              shutil.rmtree(diagram_dir)
          PY
          } 2>&1 | tee markdown-smoke.log

      - name: Set up Android SDK command-line tools
        if: steps.smoke.outcome == 'success'
        uses: android-actions/setup-android@v3

      - name: Enable KVM
        if: steps.smoke.outcome == 'success'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Android API 35 emulator image
        if: steps.smoke.outcome == 'success'
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            'platform-tools' \
            'emulator' \
            'platforms;android-35' \
            'system-images;android-35;google_apis;x86_64'

      - name: Build packaged Android test APKs
        id: test_build
        if: steps.smoke.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          ./gradlew :app:assembleDebug :app:assembleDebugAndroidTest --stacktrace 2>&1 | tee android-test-build.log

      - name: Convert Markdown with Mermaid on Android emulator
        id: e2e
        if: steps.test_build.outcome == 'success'
        continue-on-error: true
        run: |
          set -euo pipefail
          echo no | avdmanager create avd \
            --force \
            --name econverter-e2e \
            --package 'system-images;android-35;google_apis;x86_64' \
            --device 'pixel_7'

          emulator_bin="$(command -v emulator || true)"
          if [[ -z "$emulator_bin" || ! -x "$emulator_bin" ]]; then
            echo 'Android emulator binary was not found' | tee android-e2e.log
            exit 1
          fi

          "$emulator_bin" \
            -avd econverter-e2e \
            -no-window \
            -gpu swiftshader_indirect \
            -no-snapshot \
            -noaudio \
            -no-boot-anim \
            -camera-back none \
            > emulator.log 2>&1 &
          emulator_pid=$!

          cleanup() {
            adb emu kill >/dev/null 2>&1 || true
            kill "$emulator_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          sleep 5
          if ! kill -0 "$emulator_pid" >/dev/null 2>&1; then
            cat emulator.log
            echo 'Android emulator process exited during startup' | tee android-e2e.log
            exit 1
          fi

          if ! timeout 180 adb wait-for-device; then
            cat emulator.log
            echo 'adb did not connect to the Android emulator' | tee android-e2e.log
            exit 1
          fi

          if ! timeout 300 bash -c 'until [[ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r")" == "1" ]]; do sleep 5; done'; then
            adb logcat -d > android-logcat.txt 2>&1 || true
            cat emulator.log
            echo 'Android emulator did not finish booting' | tee android-e2e.log
            exit 1
          fi

          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0

          set +e
          ./gradlew connectedDebugAndroidTest --stacktrace 2>&1 | tee android-e2e.log
          status=${PIPESTATUS[0]}
          set -e
          adb logcat -d > android-logcat.txt 2>&1 || true
          exit $status

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: markdown-android-e2e-results
          path: |
            markdown-smoke.log
            android-test-build.log
            android-e2e.log
            android-logcat.txt
            emulator.log
            app/build/reports/androidTests/connected/
            app/build/outputs/androidTest-results/connected/
          if-no-files-found: warn

      - name: Generate test release signing key
        if: steps.e2e.outcome == 'success'
        run: |
          keytool -genkeypair -noprompt \
            -keystore app/markdown-test-release.keystore \
            -storepass androidtest \
            -keypass androidtest \
            -alias econverter-test \
            -dname 'CN=eConverter Markdown Test,O=barakplasma,C=IL' \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650

      - name: Build signed release APK
        id: build
        if: steps.e2e.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          ./gradlew assembleRelease --stacktrace 2>&1 | tee gradle-release.log
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/markdown-test-release.keystore
          KEYSTORE_PASSWORD: androidtest
          KEY_ALIAS: econverter-test
          KEY_PASSWORD: androidtest

      - name: Verify and rename APK
        id: verify
        if: steps.build.outcome == 'success'
        continue-on-error: true
        run: |
          test -s app/build/outputs/apk/release/app-release.apk
          jarsigner -verify app/build/outputs/apk/release/app-release.apk
          mv app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/apk/release/econverter-v1.0.6-markdown.2.apk

      - name: Upload APK artifact
        if: steps.verify.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: econverter-v1.0.6-markdown.2
          path: app/build/outputs/apk/release/econverter-v1.0.6-markdown.2.apk
          if-no-files-found: error

      - name: Publish fork-only prerelease
        id: publish
        if: steps.verify.outcome == 'success'
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.6-markdown.2
          target_commitish: ${{ github.sha }}
          name: eConverter Markdown + Mermaid Android-tested build
          prerelease: true
          generate_release_notes: true
          body: |
            Fork-only test release. No pull request has been opened upstream.

            Adds `.md` and `.markdown` input plus offline rendering of fenced Mermaid diagrams to SVG.

            Before publication, an Android API 35 x86_64 emulator runs the packaged Chaquopy app and converts a real Markdown + Mermaid document to EPUB. The test opens the EPUB and verifies its mimetype, heading, Unicode content, SVG resource, and document reference.

            This APK is signed with a test key generated for this workflow run. Uninstall a differently signed eConverter build before installing it.
          files: app/build/outputs/apk/release/econverter-v1.0.6-markdown.2.apk
          fail_on_unmatched_files: true

      - name: Clean up test key
        if: always()
        run: rm -f app/markdown-test-release.keystore

      - name: Report workflow status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
          TEST_BUILD_OUTCOME: ${{ steps.test_build.outcome }}
          E2E_OUTCOME: ${{ steps.e2e.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          PUBLISH_OUTCOME: ${{ steps.publish.outcome }}
        run: |
          if [[ "$SMOKE_OUTCOME" == success && "$TEST_BUILD_OUTCOME" == success && "$E2E_OUTCOME" == success && "$BUILD_OUTCOME" == success && "$VERIFY_OUTCOME" == success && "$PUBLISH_OUTCOME" == success ]]; then
            state=success
            description='Android E2E passed and release APK published'
          else
            state=failure
            description="smoke=$SMOKE_OUTCOME test-build=$TEST_BUILD_OUTCOME e2e=$E2E_OUTCOME build=$BUILD_OUTCOME verify=$VERIFY_OUTCOME publish=$PUBLISH_OUTCOME"
          fi
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state="$state" \
            -f context='Markdown Android E2E release' \
            -f description="$description" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

      - name: Fail workflow when validation or release failed
        if: always() && (steps.smoke.outcome != 'success' || steps.test_build.outcome != 'success' || steps.e2e.outcome != 'success' || steps.build.outcome != 'success' || steps.verify.outcome != 'success' || steps.publish.outcome != 'success')
        run: exit 1
