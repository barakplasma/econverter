name: Markdown test release

on:
  push:
    branches:
      - 'master'
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: markdown-test-release
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mark build pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state=pending \
            -f context='Markdown test release' \
            -f description='Release build started' \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Smoke-test Markdown and Mermaid rendering
        id: smoke
        continue-on-error: true
        run: |
          set -o pipefail
          {
            python -m pip install 'markdown>=3.4,<4' 'merm==0.1.5'
            python - <<'PY'
          import importlib.util
          import shutil
          import tempfile
          from pathlib import Path

          from markdown import markdown

          module_path = Path('app/src/main/python/ebook_converter/ebooks/txt/mermaid.py')
          spec = importlib.util.spec_from_file_location('econverter_mermaid', module_path)
          mermaid = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mermaid)
          render_fenced_diagrams = mermaid.render_fenced_diagrams

          table = markdown('| A | B |\n|---|---|\n| 1 | 2 |', extensions=['tables'])
          assert '<table>' in table

          with tempfile.TemporaryDirectory() as base_dir:
              source = '# Diagram\n\n```mermaid\nflowchart LR\n    A --> B\n```\n'
              rendered, diagram_dir = render_fenced_diagrams(source, base_dir)
              assert diagram_dir is not None
              assert '![Mermaid diagram]' in rendered
              svg_files = list(Path(diagram_dir).glob('*.svg'))
              assert len(svg_files) == 1
              assert '<svg' in svg_files[0].read_text(encoding='utf-8')
              shutil.rmtree(diagram_dir)

          with tempfile.TemporaryDirectory() as base_dir:
              invalid = '```mermaid\nnot-a-supported-diagram\n```\n'
              rendered, diagram_dir = render_fenced_diagrams(invalid, base_dir)
              assert diagram_dir is None
              assert rendered == invalid
          PY
          } 2>&1 | tee markdown-smoke.log

      - name: Grant execute permission for Gradle
        if: steps.smoke.outcome == 'success'
        run: chmod +x gradlew

      - name: Generate test release signing key
        if: steps.smoke.outcome == 'success'
        run: |
          keytool -genkeypair -noprompt \
            -keystore app/markdown-test-release.keystore \
            -storepass androidtest \
            -keypass androidtest \
            -alias econverter-test \
            -dname 'CN=eConverter Markdown Test,O=barakplasma,C=IL' \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650

      - name: Build signed release APK
        id: build
        if: steps.smoke.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          ./gradlew assembleRelease 2>&1 | tee gradle-release.log
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/markdown-test-release.keystore
          KEYSTORE_PASSWORD: androidtest
          KEY_ALIAS: econverter-test
          KEY_PASSWORD: androidtest

      - name: Verify and rename APK
        id: verify
        if: steps.build.outcome == 'success'
        continue-on-error: true
        run: |
          test -s app/build/outputs/apk/release/app-release.apk
          jarsigner -verify app/build/outputs/apk/release/app-release.apk
          mv app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/apk/release/econverter-v1.0.6-markdown.1.apk

      - name: Upload APK artifact
        if: steps.verify.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: econverter-v1.0.6-markdown.1
          path: app/build/outputs/apk/release/econverter-v1.0.6-markdown.1.apk
          if-no-files-found: error

      - name: Publish fork-only prerelease
        id: publish
        if: steps.verify.outcome == 'success'
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.6-markdown.1
          target_commitish: ${{ github.sha }}
          name: eConverter Markdown + Mermaid test build
          prerelease: true
          generate_release_notes: true
          body: |
            Fork-only test release. No pull request has been opened upstream.

            Adds `.md` and `.markdown` input plus offline rendering of fenced Mermaid diagrams to SVG.

            This APK is signed with a test key generated for this workflow run. Uninstall an existing upstream-signed eConverter build before installing it.
          files: app/build/outputs/apk/release/econverter-v1.0.6-markdown.1.apk
          fail_on_unmatched_files: true

      - name: Clean up test key
        if: always()
        run: rm -f app/markdown-test-release.keystore

      - name: Report workflow status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          PUBLISH_OUTCOME: ${{ steps.publish.outcome }}
        run: |
          if [[ "$SMOKE_OUTCOME" == success && "$BUILD_OUTCOME" == success && "$VERIFY_OUTCOME" == success && "$PUBLISH_OUTCOME" == success ]]; then
            state=success
            description='Release APK published'
          else
            state=failure
            description="smoke=$SMOKE_OUTCOME build=$BUILD_OUTCOME verify=$VERIFY_OUTCOME publish=$PUBLISH_OUTCOME"
          fi
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state="$state" \
            -f context='Markdown test release' \
            -f description="$description" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

      - name: Fail workflow when validation or release failed
        if: always() && (steps.smoke.outcome != 'success' || steps.build.outcome != 'success' || steps.verify.outcome != 'success' || steps.publish.outcome != 'success')
        run: exit 1
