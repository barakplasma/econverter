name: Markdown Android E2E release

on:
  push:
    branches:
      - 'master'
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  statuses: write

concurrency:
  group: markdown-android-e2e-release-master
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    concurrency:
      group: markdown-android-e2e-release-master-release
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cancel superseded workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for status in queued in_progress; do
            gh run list \
              --workflow markdown-test-release.yml \
              --status "$status" \
              --limit 100 \
              --json databaseId \
              --jq '.[].databaseId' |
            while read -r run_id; do
              if [[ -n "$run_id" && "$run_id" -lt "$GITHUB_RUN_ID" ]]; then
                echo "Cancelling superseded run $run_id"
                gh run cancel "$run_id" || true
              fi
            done
          done

      - name: Mark build pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state=pending \
            -f context='Markdown Android E2E release' \
            -f description='rumdl plus Android 16 Markdown/TXT safety tests started' \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Lint maintained Markdown structure with rumdl
        id: rumdl
        continue-on-error: true
        run: |
          set -o pipefail
          python -m pip install 'rumdl==0.2.34'
          rumdl check . 2>&1 | tee rumdl.log

      - name: Smoke-test Markdown and Mermaid rendering
        id: smoke
        if: steps.rumdl.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          {
            python -m pip install 'markdown>=3.4,<4' 'merm==0.1.5'
            python - <<'PY'
          import importlib.util
          import shutil
          import tempfile
          from pathlib import Path
          from xml.etree import ElementTree

          from markdown import markdown

          module_path = Path('app/src/main/python/ebook_converter/ebooks/txt/mermaid.py')
          spec = importlib.util.spec_from_file_location('econverter_mermaid', module_path)
          mermaid = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mermaid)
          render_fenced_diagrams = mermaid.render_fenced_diagrams

          table = markdown('| A | B |\n|---|---|\n| 1 | 2 |', extensions=['tables'])
          assert '<table>' in table

          with tempfile.TemporaryDirectory() as base_dir:
              source = '# Diagram\n\n```mermaid\nflowchart LR\n    A["Hidden\x00control"] --> B\n```\n'
              rendered, diagram_dir = render_fenced_diagrams(source, base_dir)
              assert diagram_dir is not None
              assert '![Mermaid diagram]' in rendered
              svg_files = list(Path(diagram_dir).glob('*.svg'))
              assert len(svg_files) == 1
              svg = svg_files[0].read_text(encoding='utf-8')
              assert '<svg' in svg
              assert '\x00' not in svg
              ElementTree.fromstring(svg)
              shutil.rmtree(diagram_dir)
          PY
          } 2>&1 | tee markdown-smoke.log

      - name: Convert Markdown and TXT on Android 16 emulator
        id: e2e
        if: steps.rumdl.outcome == 'success' && steps.smoke.outcome == 'success'
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          profile: pixel_7_pro
          cores: 2
          ram-size: 2048M
          disable-linux-hw-accel: true
          emulator-boot-timeout: 600
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          script: >-
            bash -o pipefail -c ': > android-e2e.log;
            ./gradlew connectedDebugAndroidTest
            -Pandroid.testInstrumentationRunnerArguments.class=com.econverter.app.MarkdownConversionInstrumentedTest
            --stacktrace 2>&1 | tee android-e2e.log;
            status=${PIPESTATUS[0]};
            adb logcat -d > android-logcat.txt 2>&1 || true;
            exit "$status"'

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: markdown-android-e2e-results
          path: |
            rumdl.log
            markdown-smoke.log
            android-e2e.log
            android-logcat.txt
            app/build/reports/androidTests/connected/
            app/build/outputs/androidTest-results/connected/
          if-no-files-found: warn

      - name: Generate test release signing key
        if: steps.e2e.outcome == 'success'
        run: |
          keytool -genkeypair -noprompt \
            -keystore app/markdown-test-release.keystore \
            -storepass androidtest \
            -keypass androidtest \
            -alias econverter-test \
            -dname 'CN=eConverter Markdown Test,O=barakplasma,C=IL' \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650

      - name: Build signed release APK
        id: build
        if: steps.e2e.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          ./gradlew assembleRelease --stacktrace 2>&1 | tee gradle-release.log
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/markdown-test-release.keystore
          KEYSTORE_PASSWORD: androidtest
          KEY_ALIAS: econverter-test
          KEY_PASSWORD: androidtest

      - name: Verify and rename APK
        id: verify
        if: steps.build.outcome == 'success'
        continue-on-error: true
        run: |
          test -s app/build/outputs/apk/release/app-release.apk
          jarsigner -verify app/build/outputs/apk/release/app-release.apk
          mv app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/apk/release/econverter-v1.0.6-markdown.6.apk

      - name: Upload APK artifact
        if: steps.verify.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: econverter-v1.0.6-markdown.6
          path: app/build/outputs/apk/release/econverter-v1.0.6-markdown.6.apk
          if-no-files-found: error

      - name: Publish fork-only prerelease
        id: publish
        if: steps.verify.outcome == 'success'
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.6-markdown.6
          target_commitish: ${{ github.sha }}
          name: eConverter Markdown + TXT structurally checked Android build
          prerelease: true
          generate_release_notes: true
          body: |
            Fork-only test release. No pull request has been opened upstream.

            Adds `.md` and `.markdown` input plus offline rendering of fenced Mermaid diagrams to SVG.

            This release applies the same text-ingress protection to `.txt`, `.text`, `.md`, `.markdown`, and `.textile`: encoding detection, BOM-less UTF-16LE/BE detection, normalization to UTF-8, and removal of XML-invalid controls such as hidden NUL characters. Generated Mermaid SVG is also sanitized and validated before ebook conversion.

            Maintained Markdown in the repository is checked with pinned `rumdl` 0.2.34 using its GFM parser and the structural MD070 nested-fence-collision rule. The linter is a CI defense; it is not bundled into the Android APK and does not replace runtime sanitization or conversion tests.

            Before publication, an Android 16 / API 36 x86_64 emulator runs the packaged Chaquopy app through three real conversions:
            - UTF-8 Markdown containing a hidden NUL in a Mermaid label to EPUB 3, validating Unicode, XHTML and the sanitized embedded SVG.
            - BOM-less UTF-16LE Markdown containing Mermaid and a hidden NUL to AZW3, validating normalized UTF-8 input and a non-empty `.azw3` file with the Kindle `BOOKMOBI` signature.
            - BOM-less UTF-16LE plain TXT containing a hidden NUL to EPUB, validating shared text normalization and control-character removal outside the Markdown path.

            The AZW3 output is the file intended for copying into a Kindle's documents folder over USB MTP. The existing Android file export/copy path is unchanged.

            This APK is signed with a test key generated for this workflow run. Uninstall a differently signed eConverter build before installing it.
          files: app/build/outputs/apk/release/econverter-v1.0.6-markdown.6.apk
          fail_on_unmatched_files: true

      - name: Clean up test key
        if: always()
        run: rm -f app/markdown-test-release.keystore

      - name: Report workflow status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          RUMDL_OUTCOME: ${{ steps.rumdl.outcome }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
          E2E_OUTCOME: ${{ steps.e2e.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          PUBLISH_OUTCOME: ${{ steps.publish.outcome }}
        run: |
          if [[ "$RUMDL_OUTCOME" == success && "$SMOKE_OUTCOME" == success && "$E2E_OUTCOME" == success && "$BUILD_OUTCOME" == success && "$VERIFY_OUTCOME" == success && "$PUBLISH_OUTCOME" == success ]]; then
            state=success
            description='rumdl and Android 16 Markdown/TXT safety E2E passed'
          else
            state=failure
            description="rumdl=$RUMDL_OUTCOME smoke=$SMOKE_OUTCOME e2e=$E2E_OUTCOME build=$BUILD_OUTCOME verify=$VERIFY_OUTCOME publish=$PUBLISH_OUTCOME"
          fi
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -f state="$state" \
            -f context='Markdown Android E2E release' \
            -f description="$description" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

      - name: Fail workflow when validation or release failed
        if: always() && (steps.rumdl.outcome != 'success' || steps.smoke.outcome != 'success' || steps.e2e.outcome != 'success' || steps.build.outcome != 'success' || steps.verify.outcome != 'success' || steps.publish.outcome != 'success')
        run: exit 1
