name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # Same-repository PRs get one automatic cleanup pass before strict checks.
  # This is kept in the same workflow so autofix and validation never run in
  # parallel against different versions of the branch.
  autofix:
    if: >-
      github.event_name == 'pull_request' &&
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: tests/python/requirements.txt

      - name: Set up uv for ty
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies and Ruff
        run: |
          python -m pip install -r tests/python/requirements.txt
          python -m pip install 'ruff==0.15.22'

      - name: Apply available ty and Ruff fixes
        run: |
          uvx --from ty==0.0.60 \
            --with-requirements tests/python/requirements.txt \
            ty check --fix . || true
          ruff check --fix --unsafe-fixes . || true
          ruff format .

      - name: Commit automatic fixes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -u
          git commit -m 'Apply automatic ty and Ruff fixes'
          git push origin HEAD:${{ github.head_ref }}

  # Runs after autofix (or directly for master, manual, and fork builds): Ruff
  # linting and formatting, ty type checking, and the host conversion suite.
  fast-checks:
    needs: autofix
    if: >-
      always() &&
      (needs.autofix.result == 'success' || needs.autofix.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout latest branch state
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: tests/python/requirements.txt

      - name: Lint Python with Ruff
        uses: astral-sh/ruff-action@v4.0.0
        with:
          version: "0.15.22"
          args: "check --output-format=github"
          src: "."

      - name: Check Python formatting with Ruff
        uses: astral-sh/ruff-action@v4.0.0
        with:
          version: "0.15.22"
          args: "format --check --diff"
          src: "."

      - name: Install host conversion dependencies
        run: python -m pip install -r tests/python/requirements.txt

      - name: Set up uv for ty
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Type-check Python with ty
        run: >-
          uvx --from ty==0.0.60
          --with-requirements tests/python/requirements.txt
          ty check --output-format github .

      - name: Run host conversion suite
        run: python -m pytest tests/python

  # Emulator E2E proves the packaged Chaquopy app converts real files on a
  # device. Only worth the 40+ minutes on master (or a manual dispatch), and
  # only after the fast checks are green.
  android-e2e:
    needs: fast-checks
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          test -r /dev/kvm && test -w /dev/kvm
          ls -l /dev/kvm

      - name: Restore Android 16 AVD snapshot
        id: avd-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-v1-${{ runner.os }}-api36-google-apis-x86-64-pixel-7-pro

      - name: Create Android 16 AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          profile: pixel_7_pro
          avd-name: econverter-api36
          force-avd-creation: false
          cores: 2
          ram-size: 2048M
          heap-size: 512M
          emulator-boot-timeout: 900
          disable-animations: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: echo 'Generated clean API 36 AVD snapshot.'

      - name: Save Android 16 AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-v1-${{ runner.os }}-api36-google-apis-x86-64-pixel-7-pro

      - name: Convert Markdown and TXT on Android 16 emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          profile: pixel_7_pro
          avd-name: econverter-api36
          force-avd-creation: false
          cores: 2
          ram-size: 2048M
          heap-size: 512M
          emulator-boot-timeout: 900
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: >-
            bash -o pipefail -c ': > android-e2e.log;
            ./gradlew connectedDebugAndroidTest
            -Pandroid.testInstrumentationRunnerArguments.class=com.econverter.app.MarkdownConversionInstrumentedTest
            --stacktrace 2>&1 | tee android-e2e.log;
            status=${PIPESTATUS[0]};
            adb logcat -d > android-logcat.txt 2>&1 || true;
            exit "$status"'

      - name: Capture emulator diagnostics
        if: always()
        run: |
          {
            echo '=== KVM ==='
            ls -l /dev/kvm || true
            echo '=== AVDs ==='
            emulator -list-avds || true
            echo '=== ADB ==='
            adb devices -l || true
            echo '=== Cached AVD files ==='
            find "$HOME/.android/avd" -maxdepth 3 -type f -printf '%p %s bytes\n' 2>/dev/null | sort || true
          } > emulator-diagnostics.txt 2>&1

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: markdown-android-e2e-results
          path: |
            android-e2e.log
            android-logcat.txt
            emulator-diagnostics.txt
            app/build/reports/androidTests/connected/
            app/build/outputs/androidTest-results/connected/
          if-no-files-found: warn

  # Fork-only prerelease APK. master only, gated on the emulator E2E passing.
  release:
    needs: android-e2e
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Validate release signing material
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          for signing_variable in \
            KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!signing_variable}" ]; then
              echo "Required signing secret ${signing_variable} is missing or unavailable."
              exit 1
            fi
          done

          keystore_path="$RUNNER_TEMP/release.keystore"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          test -s "$keystore_path"

          # Check that the keystore, its password, and the configured alias all
          # work before downloading Gradle dependencies or starting the build.
          keytool -list -keystore "$keystore_path" \
            -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" > /dev/null

          # keytool does not read the private-key password when listing an
          # alias. Signing an empty JAR verifies it without touching the APK.
          validation_file="$RUNNER_TEMP/signing-validation.txt"
          validation_jar="$RUNNER_TEMP/signing-validation.jar"
          signed_validation_jar="$RUNNER_TEMP/signing-validation-signed.jar"
          : > "$validation_file"
          jar --create --file "$validation_jar" \
            -C "$RUNNER_TEMP" "${validation_file##*/}"
          jarsigner -keystore "$keystore_path" \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -signedjar "$signed_validation_jar" \
            "$validation_jar" "$KEY_ALIAS" > /dev/null

          echo "keystore_path=$keystore_path" >> "$GITHUB_OUTPUT"

      - name: Derive release version
        id: version
        run: |
          echo "name=v1.0.6-markdown.r${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Build signed release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          KEYSTORE_PATH: ${{ steps.signing.outputs.keystore_path }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_SUFFIX: r${{ github.run_number }}
          VERSION_CODE_OFFSET: ${{ github.run_number }}

      - name: Verify and rename APK
        run: |
          test -s app/build/outputs/apk/release/app-release.apk
          jarsigner -verify app/build/outputs/apk/release/app-release.apk
          mv app/build/outputs/apk/release/app-release.apk \
            "app/build/outputs/apk/release/econverter-${{ steps.version.outputs.name }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: econverter-${{ steps.version.outputs.name }}
          path: app/build/outputs/apk/release/econverter-${{ steps.version.outputs.name }}.apk
          if-no-files-found: error

      - name: Publish fork-only prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.name }}
          target_commitish: ${{ github.sha }}
          name: eConverter Markdown + TXT structurally checked Android build
          prerelease: true
          generate_release_notes: true
          body: |
            Fork-only test release. No pull request has been opened upstream.

            Adds `.md` and `.markdown` input plus offline rendering of fenced Mermaid diagrams to SVG.

            This release applies the same text-ingress protection to `.txt`, `.text`, `.md`, `.markdown`, and `.textile`: encoding detection, BOM-less UTF-16LE/BE detection, normalization to UTF-8, and removal of XML-invalid controls such as hidden NUL characters. Generated Mermaid SVG is also sanitized and validated before ebook conversion.

            Every Python file in the repository is linted and formatted with pinned Ruff 0.15.22, then type-checked with pinned ty 0.0.60. The host conversion suite (`pytest tests/python`) reproduces the historical lxml failures on every push and pull request. These tools are CI defenses and are not bundled into the Android APK.

            Before publication, an Android 16 / API 36 x86_64 emulator runs the packaged Chaquopy app through real conversions of Markdown and TXT to EPUB 3 and AZW3, validating Unicode, XHTML, and the sanitized embedded SVG.

            The API 36 emulator uses KVM and a cached clean AVD snapshot. Cache misses generate and save the snapshot before the conversion tests run.

            The AZW3 output is the file intended for copying into a Kindle's documents folder over USB MTP. The existing Android file export/copy path is unchanged.

            This APK is signed with the project's release key, so it can update an existing installation signed with that same key.
          files: app/build/outputs/apk/release/econverter-${{ steps.version.outputs.name }}.apk
          fail_on_unmatched_files: true

      - name: Clean up release signing material
        if: always()
        run: rm -f "$RUNNER_TEMP/release.keystore" "$RUNNER_TEMP/signing-validation.txt" "$RUNNER_TEMP/signing-validation.jar" "$RUNNER_TEMP/signing-validation-signed.jar"
