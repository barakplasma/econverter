name: One-time full validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-validation-once-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: tests/python/requirements.txt

      - name: Lint Python with Ruff
        uses: astral-sh/ruff-action@v4.0.0
        with:
          version: "0.15.22"
          args: "check --output-format=github"
          src: "."

      - name: Check Python formatting with Ruff
        uses: astral-sh/ruff-action@v4.0.0
        with:
          version: "0.15.22"
          args: "format --check --diff"
          src: "."

      - name: Install host conversion dependencies
        run: python -m pip install -r tests/python/requirements.txt

      - name: Set up uv for ty
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Apply all available ty fixes
        run: >-
          uvx --from ty==0.0.60
          --with-requirements tests/python/requirements.txt
          ty check --fix .

      - name: Verify ty made no uncommitted changes
        run: git diff --exit-code

      - name: Type-check Python with ty
        run: >-
          uvx --from ty==0.0.60
          --with-requirements tests/python/requirements.txt
          ty check --output-format github .

      - name: Run host conversion suite
        run: python -m pytest tests/python

  android-e2e:
    needs: fast-checks
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          test -r /dev/kvm && test -w /dev/kvm
          ls -l /dev/kvm

      - name: Restore Android 16 AVD snapshot
        id: avd-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-v1-${{ runner.os }}-api36-google-apis-x86-64-pixel-7-pro

      - name: Create Android 16 AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          profile: pixel_7_pro
          avd-name: econverter-api36
          force-avd-creation: false
          cores: 2
          ram-size: 2048M
          heap-size: 512M
          emulator-boot-timeout: 900
          disable-animations: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: echo 'Generated clean API 36 AVD snapshot.'

      - name: Save Android 16 AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-v1-${{ runner.os }}-api36-google-apis-x86-64-pixel-7-pro

      - name: Convert Markdown and TXT on Android 16 emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          profile: pixel_7_pro
          avd-name: econverter-api36
          force-avd-creation: false
          cores: 2
          ram-size: 2048M
          heap-size: 512M
          emulator-boot-timeout: 900
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: >-
            bash -o pipefail -c ': > android-e2e.log;
            ./gradlew connectedDebugAndroidTest
            -Pandroid.testInstrumentationRunnerArguments.class=com.econverter.app.MarkdownConversionInstrumentedTest
            --stacktrace 2>&1 | tee android-e2e.log;
            status=${PIPESTATUS[0]};
            adb logcat -d > android-logcat.txt 2>&1 || true;
            exit "$status"'

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-validation-android-e2e-results
          path: |
            android-e2e.log
            android-logcat.txt
            app/build/reports/androidTests/connected/
            app/build/outputs/androidTest-results/connected/
          if-no-files-found: warn

  release-build:
    needs: android-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Generate test release signing key
        run: |
          keytool -genkeypair -noprompt \
            -keystore app/markdown-test-release.keystore \
            -storepass androidtest \
            -keypass androidtest \
            -alias econverter-test \
            -dname 'CN=eConverter Full Validation,O=barakplasma,C=IL' \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650

      - name: Build signed release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/markdown-test-release.keystore
          KEYSTORE_PASSWORD: androidtest
          KEY_ALIAS: econverter-test
          KEY_PASSWORD: androidtest
          VERSION_SUFFIX: full-validation.${{ github.run_number }}
          VERSION_CODE_OFFSET: ${{ github.run_number }}

      - name: Verify and rename APK
        run: |
          test -s app/build/outputs/apk/release/app-release.apk
          jarsigner -verify app/build/outputs/apk/release/app-release.apk
          mv app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/apk/release/econverter-full-validation.apk

      - name: Upload validated release APK
        uses: actions/upload-artifact@v4
        with:
          name: econverter-full-validation
          path: app/build/outputs/apk/release/econverter-full-validation.apk
          if-no-files-found: error

      - name: Clean up test key
        if: always()
        run: rm -f app/markdown-test-release.keystore
