[tool.ruff]
target-version = "py311"

[tool.ruff.lint.per-file-ignores]
"app/src/main/python/ebook_converter/**/*.py" = [
    "E402",
    "E721",
    "E722",
    "E741",
    "F401",
    "F811",
    "F821",
]

[tool.ty.environment]
root = ["app/src/main/python"]
python-version = "3.11"

[tool.ty.src]
include = [
    "app/src/main/python/converter.py",
    "app/src/main/python/econverter_text.py",
    "tests/python",
]
exclude = ["app/src/main/python/ebook_converter"]

[tool.ty.analysis]
replace-imports-with-any = ["ebook_converter.**", "lxml.**"]

[[tool.ty.overrides]]
include = ["app/src/main/python/converter.py"]

[tool.ty.overrides.rules]
invalid-assignment = "ignore"

[[tool.ty.overrides]]
include = ["app/src/main/python/econverter_text.py"]

[tool.ty.overrides.rules]
unresolved-attribute = "ignore"
